services:
  - type: web
    name: zavlo-ia-backend
    env: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build:backend
    startCommand: node dist/src/main
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: API_PREFIX
        value: api/v1
